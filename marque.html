<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <marquee behavior="" direction="left" scrollamount="300" scrolldelay="800" style="background-color: aqua;" width=""
        height="150px" loop="" vspace="50px" hspace="50px">
        <img src="image/tom jeery.jpg" alt="tom and cherry" width="50px" height="50px" />
    </marquee>
    <marquee behavior="slide" direction="top" scrollamount="10" scrolldelay="800" style="background-color: brown ;" width=""

        <img src="image/tom jeery.jpg" alt="tom and cherry" width="50px" height="50px" />
    </marquee>
<marquee behavior="alternate" direction="top" scrollamount="10" scrolldelay="800" style="background-color: rgb(42, 165, 83) ;" width=""
        height="150px" loop="10" vspace="50px" hspace="50px">
        <img src="image/tom jeery.jpg" alt="tom and cherry" width="50px" height="50px" />
    </marquee>

</body>
